<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cherry pick login page</title>
    <style>
      :root {
        --bg1: #0f172a;
        --bg2: #1e293b;
        --card: rgba(15, 23, 42, 0.72);
        --accent: #38bdf8;
        --accent2: #a78bfa;
        --text: #e2e8f0;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--text);
        background: linear-gradient(135deg, var(--bg1), var(--bg2));
        overflow: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: absolute;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        filter: blur(20px);
        opacity: 0.35;
        animation: float 8s ease-in-out infinite;
      }

      body::before {
        background: radial-gradient(circle, var(--accent), transparent 70%);
        top: 10%;
        left: 10%;
      }

      body::after {
        background: radial-gradient(circle, var(--accent2), transparent 70%);
        bottom: 10%;
        right: 10%;
        animation-delay: -4s;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-20px) scale(1.1); }
      }

      .login-card {
        position: relative;
        width: min(92vw, 380px);
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        background: var(--card);
        backdrop-filter: blur(16px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        animation: popIn 0.9s ease both;
      }

      .login-card::before {
        content: "";
        position: absolute;
        inset: -2px;
        border-radius: 22px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        z-index: -1;
        filter: blur(12px);
        opacity: 0.35;
      }

      @keyframes popIn {
        from { opacity: 0; transform: translateY(30px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      h1 { margin: 0 0 0.35rem; font-size: 2rem; }
      p { margin: 0 0 1.5rem; color: #cbd5e1; }
      .field { margin-bottom: 1rem; }
      label { display: block; margin-bottom: 0.5rem; font-size: 0.92rem; }

      input {
        width: 100%;
        padding: 0.95rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        outline: none;
        transition: 0.25s ease;
      }

      input::placeholder { color: #94a3b8; }
      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.18);
        transform: translateY(-1px);
      }

      .options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin: 0.25rem 0 1.3rem;
        font-size: 0.9rem;
      }

      .options a { color: var(--accent); text-decoration: none; }
      .options a:hover { text-decoration: underline; }

      button {
        width: 100%;
        border: none;
        padding: 0.95rem 1rem;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 700;
        color: #fff;
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        background-size: 200% 200%;
        animation: gradientMove 4s ease infinite;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 30px rgba(56, 189, 248, 0.25);
      }

      @keyframes gradientMove {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }

      .footer {
        margin-top: 1.2rem;
        text-align: center;
        font-size: 0.9rem;
        color: #cbd5e1;
      }

      .footer a {
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="login-card">
      <h1>Welcome Back</h1>
      <p>Sign in to continue to your account.</p>

      <form>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Enter your email" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter your password" />
        </div>

        <div class="options">
          <label><input type="checkbox" /> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit">Login</button>
      </form>

      <div class="footer">Don't have an account? <a href="#">Create one</a></div>
    </main>
  </body>
</html>
