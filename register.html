  <title>Register</title>
  <style>
    :root { --bg1:#0f172a; --bg2:#1e293b; --card:rgba(15,23,42,.78); --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --accent2:#8b5cf6; }
    * { box-sizing:border-box; margin:0; padding:0; font-family:Arial, Helvetica, sans-serif; }
    body {
      min-height:100vh; display:grid; place-items:center; overflow:hidden; color:var(--text);
      background:linear-gradient(-45deg, var(--bg1), var(--bg2), #312e81, #0f766e); background-size:400% 400%;
      animation:gradientShift 14s ease infinite;
    }
    .blob { position:absolute; width:260px; height:260px; border-radius:50%; filter:blur(18px); opacity:.28; animation:float 10s ease-in-out infinite; z-index:0; }
    .one { background:var(--accent); top:8%; left:10%; }
    .two { background:var(--accent2); bottom:10%; right:8%; animation-delay:-4s; }
    .card {
      position:relative; z-index:1; width:min(92vw, 420px); padding:2rem; border-radius:24px; background:var(--card);
      border:1px solid rgba(255,255,255,.12); backdrop-filter:blur(14px); box-shadow:0 20px 60px rgba(0,0,0,.35);
      animation:cardIn .9s ease both;
    }
    h1 { font-size:2rem; text-align:center; margin-bottom:.5rem; }
    p { text-align:center; color:var(--muted); margin-bottom:1.5rem; font-size:.95rem; }
    .field { margin-bottom:1rem; }
    label { display:block; margin-bottom:.45rem; font-size:.9rem; color:#cbd5e1; }
    input {
      width:100%; padding:.95rem 1rem; border:1px solid rgba(255,255,255,.12); border-radius:14px;
      background:rgba(15,23,42,.75); color:var(--text); outline:none;
      transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
    }
    input::placeholder { color:#64748b; }
    input:focus { border-color:rgba(56,189,248,.85); box-shadow:0 0 0 4px rgba(56,189,248,.15); transform:translateY(-2px); }
    .btn {
      width:100%; border:none; border-radius:14px; padding:.95rem 1rem; margin-top:.4rem; font-size:1rem; font-weight:700;
      color:#fff; cursor:pointer; background:linear-gradient(135deg, var(--accent), var(--accent2)); background-size:200% 200%;
      animation:buttonGlow 4s ease infinite; transition:transform .2s ease, box-shadow .2s ease;
    }
    .btn:hover { transform:translateY(-2px); box-shadow:0 12px 30px rgba(56,189,248,.25); }
    .footer { margin-top:1rem; text-align:center; color:var(--muted); font-size:.9rem; }
    .footer a { color:#7dd3fc; text-decoration:none; }
    @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes cardIn { from{opacity:0; transform:translateY(28px) scale(.96)} to{opacity:1; transform:translateY(0) scale(1)} }
    @keyframes float { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-22px) scale(1.08)} }
    @keyframes buttonGlow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @media (max-width:480px){ .card{padding:1.5rem; border-radius:20px} h1{font-size:1.7rem} }
  </style>
</head>
