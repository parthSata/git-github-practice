<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Register</title>
	<style>
		:root { --bg1:#0f172a; --bg2:#111827; --card:rgba(15,23,42,.72); --text:#e5e7eb; --muted:#94a3b8; --accent:#8b5cf6; --accent2:#06b6d4; --line:rgba(255,255,255,.12); }
		* { box-sizing:border-box; }
		body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Arial,Helvetica,sans-serif; color:var(--text); background:linear-gradient(135deg,var(--bg1),var(--bg2)); overflow:hidden; }
		body::before, body::after { content:""; position:absolute; border-radius:50%; filter:blur(20px); opacity:.35; animation:float 10s ease-in-out infinite; }
		body::before { width:240px; height:240px; background:var(--accent); top:8%; left:12%; }
		body::after { width:320px; height:320px; background:var(--accent2); bottom:8%; right:10%; animation-delay:-4s; }
		.card { position:relative; width:min(420px, calc(100vw - 32px)); padding:32px; border:1px solid var(--line); border-radius:24px; background:var(--card); backdrop-filter:blur(16px); box-shadow:0 20px 60px rgba(0,0,0,.35); animation:pop .9s ease-out, glow 4s ease-in-out infinite; z-index:1; }
		.card h1 { margin:0 0 8px; font-size:2rem; text-align:center; }
		.card p { margin:0 0 24px; text-align:center; color:var(--muted); }
		.field { margin-bottom:16px; }
		label { display:block; margin-bottom:8px; font-size:.95rem; color:#cbd5e1; }
		input { width:100%; padding:14px 16px; border:1px solid var(--line); border-radius:14px; outline:none; color:var(--text); background:rgba(255,255,255,.06); transition:.25s ease; }
		input::placeholder { color:#94a3b8; }
		input:focus { border-color:rgba(139,92,246,.9); box-shadow:0 0 0 4px rgba(139,92,246,.18); transform:translateY(-1px); }
		.btn { width:100%; margin-top:8px; padding:14px 16px; border:0; border-radius:14px; font-size:1rem; font-weight:700; color:#fff; cursor:pointer; background:linear-gradient(135deg,var(--accent),var(--accent2)); background-size:200% 200%; animation:gradientMove 5s ease infinite; transition:transform .2s ease, box-shadow .2s ease; box-shadow:0 14px 30px rgba(6,182,212,.18); }
		.btn:hover { transform:translateY(-2px); box-shadow:0 16px 36px rgba(139,92,246,.24); }
		.footer { margin-top:18px; text-align:center; color:var(--muted); font-size:.95rem; }
		.footer a { color:#c4b5fd; text-decoration:none; }
		.footer a:hover { text-decoration:underline; }
		@keyframes pop { from { opacity:0; transform:translateY(24px) scale(.96); } to { opacity:1; transform:translateY(0) scale(1); } }
		@keyframes float { 0%,100% { transform:translateY(0) scale(1); } 50% { transform:translateY(-20px) scale(1.08); } }
		@keyframes glow { 0%,100% { box-shadow:0 20px 60px rgba(0,0,0,.35); } 50% { box-shadow:0 20px 60px rgba(139,92,246,.18); } }
		@keyframes gradientMove { 0% { background-position:0% 50%; } 50% { background-position:100% 50%; } 100% { background-position:0% 50%; } }
	</style>
</head>
<body>
	<main class="card">
		<h1>Create Account</h1>
		<p>Join us today and get started in seconds.</p>
		<form>
			<div class="field"><label for="name">Full Name</label><input id="name" type="text" placeholder="Enter your name" /></div>
			<div class="field"><label for="email">Email Address</label><input id="email" type="email" placeholder="Enter your email" /></div>
			<div class="field"><label for="password">Password</label><input id="password" type="password" placeholder="Create a password" /></div>
			<div class="field"><label for="confirm">Confirm Password</label><input id="confirm" type="password" placeholder="Confirm your password" /></div>
			<button class="btn" type="submit">Register</button>
		</form>
		<div class="footer">Already have an account? <a href="#">Sign in</a></div>
	</main>
</body>
</html>
