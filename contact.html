<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f7fb;
            color: #222;
        }

        .contact-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 32px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            text-align: center;
        }

        p {
            text-align: center;
            color: #555;
        }

        form {
            display: grid;
            gap: 16px;
            margin-top: 24px;
        }

        label {
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cfd8e3;
            border-radius: 8px;
            font: inherit;
            box-sizing: border-box;
        }

        textarea {
            min-height: 140px;
            resize: vertical;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .contact-info {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            text-align: center;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <h1>Contact Us</h1>
        <p>We'd love to hear from you. Send us a message and we'll get back to you soon.</p>

        <form>
            <div>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name">
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your email">
            </div>

            <div>
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Write your message"></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>

        <div class="contact-info">
            <p>Email: support@example.com</p>
            <p>Phone: +1 (555) 123-4567</p>
        </div>
    </div>
</body>
</html>
